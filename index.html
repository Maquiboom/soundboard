<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎵 Soundboard</h1>

  <div class="container">
    <button onclick="playSound('sonido1')">Sonido 1</button>
    <button onclick="playSound('sonido2')">Sonido 2</button>
    <button onclick="playSound('sonido3')">Sonido 3</button>
  </div>

  <audio id="sonido1" src="sounds/sonido1.mp3"></audio>
  <audio id="sonido2" src="sounds/sonido2.mp3"></audio>
  <audio id="sonido3" src="sounds/sonido3.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
