<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <h1>🎵 Soundboard</h1>
    <button id="themeToggle">🌙</button>
  </div>

  <div class="container">

    <button class="sound-btn" onclick="playSound('sonido1', this)">
      <span class="icon">🔥</span>
      <span class="label">FAHH</span>
    </button>

     <button class="sound-btn" onclick="playSound('sonido4', this)">
      <span class="icon">🤮</span>
      <span class="label">Fart</span>
    </button>
    
    <button class="sound-btn" onclick="playSound('sonido2', this)">
      <span class="icon">😂</span>
      <span class="label">I got this</span>
    </button>

     <button class="sound-btn" onclick="playSound('sonido5', this)">
      <span class="icon">😯</span>
      <span class="label">Surprise</span>
    </button>

     <button class="sound-btn" onclick="playSound('sonido6', this)">
      <span class="icon">👋</span>
      <span class="label">Hello there</span>
    </button>
    
    <button class="sound-btn" onclick="playSound('sonido3', this)">
      <span class="icon">🛎️</span>
      <span class="label">sus</span>
    </button>

  </div>

  <audio id="sonido1" src="fah.mp3"></audio>
  <audio id="sonido2" src="i_got_this.mp3"></audio>
  <audio id="sonido3" src="sus.mp3"></audio>
  <audio id="sonido4" src="fart.mp3"></audio>
  <audio id="sonido5" src="surprise.mp3"></audio>
  <audio id="sonido6" src="hello_there.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
