<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎵 Soundboard</h1>

  <div class="container">

    <button class="sound-btn" onclick="playSound('sonido1', this)">
      <span class="icon">🔥</span>
      <span class="label">Explosión</span>
    </button>

    <button class="sound-btn" onclick="playSound('sonido2', this)">
      <span class="icon">😂</span>
      <span class="label">Risa</span>
    </button>

    <button class="sound-btn" onclick="playSound('sonido3', this)">
      <span class="icon">👏</span>
      <span class="label">Aplausos</span>
    </button>

  </div>

  <audio id="sonido1" src="sounds/sonido1.mp3"></audio>
  <audio id="sonido2" src="sounds/sonido2.mp3"></audio>
  <audio id="sonido3" src="sounds/sonido3.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
